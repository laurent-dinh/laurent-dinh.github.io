<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/fontawesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/solid.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/brands.min.css">
  <link href='https://fonts.googleapis.com/css?family=Roboto+Condensed:300' rel='stylesheet' type='text/css'>
  <meta property="og:image" content="{{ site.url }}/img/miniature.JPG">
  <meta name="twitter:image" content="{{ site.url }}/img/miniature.JPG">
  <link rel="preload" href="{{ site.baseurl }}/style.css" as="style">
  <link rel="preload" href="{{ site.baseurl }}/style.dark.css" as="style">
  <link rel="stylesheet" id="CSS" href="{{ site.baseurl }}/style.css">
  <script type="text/javascript">

  // looks for the ?darkmode parameter 
  // sets global variable darkMode to true or false

  function lightSwitch() {
    if (window.localStorage.getItem("dark") == "true") {
      window.localStorage.setItem("dark", false);
      lightMode();
    }
    else {
      window.localStorage.setItem("dark", true);
      darkMode();
    }
  }

  function initSwitch() {
    const hours = new Date().getHours();
    if (window.localStorage.getItem("dark_init") == null) {
      if (hours > 6 && hours < 20) {
        window.localStorage.setItem("dark_init", true);
        window.localStorage.setItem("dark", false);
        lightMode();
      }
      else {
        window.localStorage.setItem("dark_init", true);
        window.localStorage.setItem("dark", true);
        darkMode();
      }
    }
    else {
      if (window.localStorage.getItem("dark") == "true") {
        darkMode();
      }
      else {
        lightMode();
      }
    }
  }

  function defaultDarkMode() {
    document.getElementById('CSS').href="/style.dark.css";
    document.getElementById('colorChanger').children[0].setAttribute("class", "fas fa-sun");
    document.getElementById('logo').style="background-image: url({{ site.url }}/img/logo_light.svg)";
    if (document.getElementById('logo_sign') != null) {
      document.getElementById('logo_sign').setAttribute("data", "{{ site.url }}/img/logo_reac_dark.svg");
    }
    if (document.getElementById('logo_static') != null) {
      document.getElementById('logo_static').setAttribute("src", "{{ site.url }}/img/logo_static_dark.svg");
    }
    document.getElementsByTagName("label")[0].style="background-color: #000; color: #aaa; border-color: #aaa";
    const allCodes = document.getElementsByTagName("code");
    for (let i = 0; i < allCodes.length; i++) {
      allCodes[i].style.setProperty("background-color", "#060D0B");
    }
    const allCodeBlocks = document.getElementsByClassName("codeblock");
    for (let i = 0; i < allCodeBlocks.length; i++) {
      allCodeBlocks[i].style.setProperty("background-color", "#060D0B");
    }
  }

  function defaultLightMode() {
    document.getElementById('CSS').href="/style.css";
    document.getElementById('colorChanger').children[0].setAttribute("class", "fas fa-moon");
    document.getElementById('logo').style="background-image: url({{ site.url }}/img/logo_dark.svg)";
    if (document.getElementById('logo_sign') != null) {
      document.getElementById('logo_sign').setAttribute("data", "{{ site.url }}/img/logo_reac.svg");
    }
    if (document.getElementById('logo_static') != null) {
      document.getElementById('logo_static').setAttribute("src", "{{ site.url }}/img/logo_static.svg");
    }
    document.getElementsByTagName("label")[0].style="background-color: #fff; color: #333; border-color: #333";
    const allCodes = document.getElementsByTagName("code");
    for (let i = 0; i < allCodes.length; i++) {
      allCodes[i].style.setProperty("background-color", "#f9f2f4");
    }
    const allCodeBlocks = document.getElementsByClassName("codeblock");
    for (let i = 0; i < allCodeBlocks.length; i++) {
      allCodeBlocks[i].style.setProperty("background-color", "#f9f2f4");
    }
  }
  // <div class="codeblock">
  // <code>
  // def func(<span data-toggle="tooltip" data-placement="bottom" title="That's a standard name...">foo</span>, bar):  <br/>
  // &numsp;&numsp;return bar
  // </code>
  // </div>

  darkMode = function() {defaultDarkMode();};
  lightMode = function() {defaultLightMode();};

  function resizeSideBar() {
    var body = document.body,
        html = document.documentElement;

    var height = Math.max( body.scrollHeight || 0, body.offsetHeight || 0, 
                           html.clientHeight || 0, html.scrollHeight || 0,
                           html.offsetHeight || 0 );
    document.getElementsByClassName("sidebar")[0].style.height = height + "px";
  }

  function fixSideBar() {
    const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
    const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
    var bottom_bar = 630; 
    // document.getElementsByClassName(
    //   "sidebar")[0].getElementsByTagName(
    //   "p")[3].getBoundingClientRect()["y"];

    resizeSideBar();
    if (bottom_bar < vh) {
      document.getElementsByClassName("sidebar")[0].style.position = "fixed";
    }
    else {
      document.getElementsByClassName("sidebar")[0].style.position = "";
    }
  }

  var waitForEl = function(selector, callback) {
    if (jQuery(selector).length) {
      callback();
    } else {
      setTimeout(function() {
        waitForEl(selector, callback);
      }, 100);
    }
  };

  window.onresize = fixSideBar;
  </script>
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}">
  <link rel="shortcut icon" href="{{ site.baseurl }}/logo.ico"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>

</head>
